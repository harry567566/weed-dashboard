<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autonomous Weed Detection — Live Dashboard</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 720px; margin: 4rem auto; padding: 1rem; color: #222;
         text-align: center; }
  h1 { color: #2a7; }
  .status { padding: 1rem 1.5rem; border-radius: 8px; margin: 2rem 0;
            display: inline-block; }
  .status.ok { background: #d4f0d4; color: #285; }
  .status.warn { background: #ffe5b4; color: #864; }
  .status.err { background: #ffd4d4; color: #844; }
  .small { color: #888; font-size: 0.9rem; }
  a { color: #2a7; }
  code { background: #f5f5f5; padding: 0.1rem 0.4rem; border-radius: 3px;
         word-break: break-all; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
</style></head><body>
<h1>🌱 Autonomous Weed Detection Dashboard</h1>
<p class="small">Live state from the cluster, autonomously growing dataset corpus.</p>
<div id="status" class="status"><span class="spin">⟳</span> Looking for live cluster server…</div>
<div id="info" class="small"></div>
<p class="small">Manual fallback (static snapshot from last cluster push):
  <a href="dashboard/index.html">browse last snapshot</a>
</p>
<script>
async function findLive() {
  const sEl = document.getElementById('status');
  const iEl = document.getElementById('info');
  try {
    const r = await fetch('tunnel_url.json?cb=' + Date.now(),
                          {cache: 'no-store'});
    if (!r.ok) throw new Error('tunnel_url.json missing (server has not started yet)');
    const j = await r.json();
    if (!j.url || j.url.indexOf('failed-to-expose') >= 0) {
      throw new Error('cluster tunnel down');
    }
    // The browser cannot reliably CORS-probe an arbitrary URL with /healthz,
    // so we just redirect and let the user see the cluster directly.
    sEl.className = 'status ok';
    sEl.innerHTML = '✅ Live cluster server is up — redirecting…';
    iEl.innerHTML = '<code>' + j.url + '</code><br>(updated ' + j.updated_at + ')';
    setTimeout(function() { window.location = j.url + '/'; }, 600);
  } catch (e) {
    sEl.className = 'status warn';
    sEl.innerHTML = '⚠️ Cluster server unreachable — showing static snapshot';
    iEl.innerHTML = String(e);
    setTimeout(function() { window.location = 'dashboard/index.html'; }, 2200);
  }
}
findLive();
</script>
</body></html>
