<!doctype html><html><head><meta charset="utf-8">
<title>Weed-detection dashboard — auth required</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;
     padding:3rem 1rem;color:#1a1a1d;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
     min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center}
.box{background:rgba(255,255,255,0.95);max-width:480px;margin:0 auto;padding:2.4rem 2rem;
     border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);
     backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
h1{color:#0e7c66;font-size:1.6rem;margin:0 0 .5rem 0}
.sub{color:#666;font-size:.92rem;margin:0 0 1.8rem 0}
.user-row{background:#f4f6fb;border-radius:8px;padding:.6rem .9rem;margin:.6rem 0;
          font-size:.9rem;color:#555;text-align:left}
.user-row code{background:#fff;padding:.15rem .45rem;border-radius:4px;
               font-family:ui-monospace,Menlo,monospace;color:#0e7c66;font-weight:600}
.input-row{display:flex;gap:.5rem;margin:.8rem 0}
input[type=password],input[type=text]{flex:1;padding:.7rem .9rem;font-size:14px;
   border:1px solid #c8d0dc;border-radius:8px;font-family:inherit;outline:none;
   transition:border-color .15s,box-shadow .15s}
input:focus{border-color:#0e7c66;box-shadow:0 0 0 3px rgba(14,124,102,.15)}
button{background:linear-gradient(135deg,#0e7c66 0%,#0a9b7a 100%);color:#fff;border:0;
       padding:.7rem 1.4rem;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;
       transition:transform .1s,box-shadow .15s}
button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(14,124,102,.35)}
button:active{transform:translateY(0)}
button:disabled{opacity:.5;cursor:wait;transform:none}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.err{color:#c53030;background:#fff5f5;border-left:3px solid #c53030;
     padding:.7rem 1rem;border-radius:6px;margin:1rem 0;display:none;
     font-size:.88rem;text-align:left}
.info{color:#2f855a;background:#f0fff4;border-left:3px solid #2f855a;
      padding:.7rem 1rem;border-radius:6px;margin:1rem 0;display:none;
      font-size:.88rem;text-align:left}
.hint{color:#888;font-size:.78rem;margin-top:1.2rem}
.hint code{background:#fff;padding:.05rem .35rem;border-radius:3px;color:#555;
           font-family:ui-monospace,Menlo,monospace}
</style></head><body>
<div class="box">
<h1>🌱 Weed-detection dashboard</h1>
<p class="sub">Bridges-2 cluster · v3.0.71 · auth required</p>

<div class="user-row">
  username: <code>harry</code> · password: <em>auto-filled in field below</em>
</div>

<div id="err" class="err"></div>
<div id="info" class="info"></div>

<div class="input-row">
<input type="password" id="pw" placeholder="password (paste, press Enter)" autocomplete="current-password" autofocus>
<button onclick="auth()" id="btn">▶ enter</button>
</div>

<p class="hint">Wrong 5 times → IP locked 1 hour.<br>
Trouble? Make sure no leading/trailing space. Hit Enter or click button.</p>
</div>
<script>
function showErr(m){
  const e=document.getElementById('err');e.style.display='block';e.textContent=m;
  document.getElementById('info').style.display='none';
}
function showInfo(m){
  const e=document.getElementById('info');e.style.display='block';e.textContent=m;
  document.getElementById('err').style.display='none';
}

async function auth(){
  const btn=document.getElementById('btn');
  // CRITICAL: .trim() to strip whitespace from copy-paste
  let pw = document.getElementById('pw').value;
  pw = pw.replace(/^\s+|\s+$/g, '');  // explicit trim, in case .trim() has edge cases
  if(!pw){ showErr('password required'); return }

  btn.disabled = true;
  btn.textContent = '⟳ checking...';
  showInfo('Verifying password against live cluster…');

  try {
    const r0 = await fetch('/weed-dashboard/tunnel_url.json?cb='+Date.now(), {cache:'no-store'});
    if(!r0.ok) throw new Error('tunnel_url.json missing (status '+r0.status+')');
    const j = await r0.json();
    if(!j.url) throw new Error('tunnel url empty');
    showInfo('Reached tunnel registry → ' + j.url.slice(0,40) + '... verifying creds');

    const real = await fetch(j.url + '/api/state', {
      headers: {'Authorization': 'Basic ' + btoa('harry:' + pw)},
      method: 'GET',
    });
    if(real.status === 200){
      showInfo('✓ Password OK. Redirecting to dashboard…');
      // Build redirect path preserving subpath/query/hash
      let sub = window.location.pathname.replace(/^\/weed-dashboard/,'') || '/';
      if(sub === '') sub = '/';
      // Save credentials so browser sticks them across same-origin fetches
      // (browser native Basic auth picks up from WWW-Authenticate response;
      //  we just navigate)
      setTimeout(() => {
        window.location.replace(j.url + sub + window.location.search + window.location.hash);
      }, 600);
    } else if(real.status === 401){
      showErr('Wrong password. (Tried username "harry" with the entered password — server said 401)');
      btn.disabled = false; btn.textContent = '▶ enter';
      document.getElementById('pw').focus();
      document.getElementById('pw').select();
    } else if(real.status === 429){
      try {
        const t = await real.json();
        showErr('🔒 IP locked: ' + (t.msg || 'too many failed attempts'));
      } catch { showErr('🔒 IP locked: too many failed attempts (1h cooldown)'); }
      btn.disabled = false; btn.textContent = '▶ enter';
    } else {
      showErr('Unexpected response: HTTP ' + real.status);
      btn.disabled = false; btn.textContent = '▶ enter';
    }
  } catch(e){
    showErr('Cluster unreachable: ' + e.message + ' (tunnel may have just restarted; refresh in 30s)');
    btn.disabled = false; btn.textContent = '▶ enter';
  }
}

document.getElementById('pw').addEventListener('keypress', (e)=>{
  if(e.key === 'Enter') auth();
});
</script>
</body></html>
